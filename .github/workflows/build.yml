name: test-and-release

on:
  pull_request:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore Chater.sln
      - run: dotnet build Chater.sln --configuration Release --no-restore
      - run: dotnet test Chater.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: "**/TestResults/*.trx"

  publish:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: test
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-13
            rid: osx-x64
          - os: macos-14
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Validate version tag
        id: version
        shell: bash
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $TAG_NAME. Expected vX.Y.Z."
            exit 1
          fi
          echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore Chater/Chater.csproj --runtime ${{ matrix.rid }} --property:Configuration=Release -p:SelfContained=true
      - run: dotnet publish Chater/Chater.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained true --no-restore --output artifacts/${{ matrix.rid }} -p:Version=${{ steps.version.outputs.version }}
      - name: Package application
        shell: pwsh
        run: Compress-Archive -Path "artifacts/${{ matrix.rid }}/*" -DestinationPath "artifacts/chater-${{ matrix.rid }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: chater-${{ matrix.rid }}
          path: artifacts/chater-${{ matrix.rid }}.zip

  release:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: chater-*
          path: release-assets
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" release-assets/*.zip --clobber
